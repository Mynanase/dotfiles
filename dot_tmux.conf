# ============================================================
# tmux config — macOS + Ghostty
# Theme: Rosé Pine (via TPM)
# ============================================================

# ---- Prefix ----
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ---- General behavior ----
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:extkeys"
set -ag terminal-overrides ",*:RGB"
set -sg escape-time 0
set -sg repeat-time 600
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g focus-events on
set -g allow-passthrough on
set -g set-clipboard on
set -g detach-on-destroy off
set -g exit-empty on
set -g default-shell /bin/zsh
set -g xterm-keys on
set -g extended-keys on
set -g set-titles on
setw -g automatic-rename on

# ---- Silence noise ----
set -g visual-activity off
setw -g monitor-activity off
setw -g monitor-bell off

# ---- Display timing ----
set -g display-panes-time 2000
set -g display-time 2000

# ---- Copy mode (vi keys) ----
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-e send-keys -X halfpage-down

# ---- Splits with current dir ----
bind '"' split-window -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ---- Window navigation ----
bind -r C-p previous-window
bind -r C-n next-window

# ---- Vim-style pane navigation (prefix + hjkl) ----
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ---- Vim-style pane resize (prefix + H/J/K/L, repeatable) ----
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---- Zoom pane (prefix + z) ----
bind z resize-pane -Z

# ---- Quick reload ----
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded ✓"

# ---- Nested tmux: F12 sends prefix to outer tmux ----
bind -T root F12 send-prefix

# ---- Session management ----
bind C-f command-prompt -p "find session:" "switch-client -t %%"
bind S command-prompt -p "new session:" "new-session -A -s %%"
bind W choose-tree -Z
bind , command-prompt -p "rename window:" "rename-window '%%'"

# ============================================================
# Plugins (TPM)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'rose-pine/tmux'

# ---- Rosé Pine options ----
set -g @rose_pine_variant 'main'
set -g @rose_pine_host 'on'
set -g @rose_pine_user 'on'
set -g @rose_pine_date_time '%H:%M'
set -g @rose_pine_directory 'on'

# Make status bar transparent to match Ghostty's opacity
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
